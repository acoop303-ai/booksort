<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BookSort v71 — Scan Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0F0F;--s1:#1A1A1A;--s2:#242424;--s3:#2E2E2E;
  --text:#F0EDE8;--muted:#777;--border:#2E2E2E;
  --accent:#FF6B35;--green:#4AE89E;--blue:#4A9EE8;--yellow:#E8C44A;--purple:#B47AE8;--red:#E87A7A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',-apple-system,sans-serif}
body{display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding:11px 16px 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.hdr-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.hdr-meta b{color:var(--text)}
.reload-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;
  border-radius:6px;cursor:pointer;transition:background 0.1s}
.reload-btn:hover{background:var(--s3)}

/* ── CONTROLS ── */
.ctrl{flex-shrink:0;padding:8px 16px 0}
.search-row{display:flex;gap:8px;margin-bottom:7px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.sort-btn{background:var(--s1);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;white-space:nowrap;transition:border-color 0.1s}
.sort-btn:hover{border-color:var(--accent)}
.filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);
  white-space:nowrap;font-family:'Syne',sans-serif;transition:all 0.12s}
.pill.active{border-color:transparent;background:var(--accent);color:#fff}

/* ── GRID ── */
.grid-wrap{flex:1;overflow-y:auto;padding:12px 16px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;cursor:default;transition:border-color 0.15s}
.card:hover{border-color:var(--accent)}
.card-cover{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--s2);display:block}
.card-cover-placeholder{width:100%;aspect-ratio:2/3;background:var(--s2);display:flex;
  align-items:center;justify-content:center;font-size:28px;color:var(--border)}
.card-body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:4px;flex:1}
.card-title{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-isbn{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.card-best{display:flex;align-items:baseline;gap:4px;margin-top:2px}
.card-best-price{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent)}
.card-best-vendor{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase}
.card-prices{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.price-row{display:flex;justify-content:space-between;align-items:center}
.price-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.price-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--text)}
.price-val.green{color:var(--green)}
.price-val.blue{color:var(--blue)}
.price-val.purple{color:var(--purple)}
.price-val.zero{color:var(--border)}
.card-ebay-badge{margin-top:5px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);
  border-radius:5px;padding:3px 6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--accent)}
.card-date{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:4px}

/* ── EMPTY / LOADING ── */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);gap:8px;text-align:center}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GAS URL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:14px;
  padding:20px;width:100%;max-width:420px}
.modal h3{font-size:14px;font-weight:800;margin-bottom:4px}
.modal p{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;margin-bottom:10px}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:9px;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:700;border:none;cursor:pointer;transition:opacity 0.1s}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.secondary{background:var(--s2);color:var(--text)}
.modal-btn:hover{opacity:0.85}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">Book<span>Sort</span> <span style="font-size:13px;color:var(--muted);font-weight:400">v71</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="hdr-meta"><b id="stat-count">—</b> books</div>
      <button class="reload-btn" onclick="loadBooks()">↺ Reload</button>
      <button class="reload-btn" onclick="showUrlModal()" title="Change GAS URL">⚙</button>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="ctrl">
  <div class="search-row">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search title or ISBN…" oninput="renderGrid()">
    </div>
    <button class="sort-btn" id="sort-toggle" onclick="toggleSort()">↓ Best $</button>
  </div>
  <div class="filters">
    <div class="pill active" data-v="ALL" onclick="setFilter(this)">All</div>
    <div class="pill" data-v="TB" onclick="setFilter(this)">ThriftBooks</div>
    <div class="pill" data-v="BR" onclick="setFilter(this)">BooksRun</div>
    <div class="pill" data-v="BS" onclick="setFilter(this)">BookScouter</div>
    <div class="pill" data-v="EBAY" onclick="setFilter(this)">eBay $10+</div>
    <div class="pill" data-v="TRASH" onclick="setFilter(this)">Under $0.50</div>
  </div>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div id="state" class="state-msg" style="display:none"></div>
</div>

<!-- GAS URL Modal -->
<div class="modal-bg" id="url-modal" style="display:none">
  <div class="modal">
    <h3>GAS Write URL</h3>
    <p>Paste your GAS_WRITE_URL (the Scan Log endpoint). Found in CREDENTIALS.md.</p>
    <input type="text" id="url-input" placeholder="https://script.google.com/macros/s/…/exec">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="hideUrlModal()">Cancel</button>
      <button class="modal-btn primary" onclick="saveUrl()">Save & Load</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
// Hardcoded from CREDENTIALS.md — update here if GAS_WRITE_URL changes
const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbwqJhxncPNffnJRVFcvfH7UbQVQKZ24oG1xDZdwXOon2KOqlg5U4jjvjS-Z2eqE7aHd/exec';
const STORE_KEY = 'bs71_gas_url';

let _books = [];
let _sortDesc = true; // sort by Best Price $ desc
let _filter = 'ALL';
let _gasUrl = '';

// ── Init ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  _gasUrl = localStorage.getItem(STORE_KEY) || DEFAULT_URL;
  loadBooks();
});

// ── Load from GAS ────────────────────────────────────────────────────────────
function loadBooks() {
  setState('<div class="spinner"></div><span>Loading Scan Log…</span>');
  document.getElementById('stat-count').textContent = '—';

  const url = _gasUrl + '?action=getScanLog&_=' + Date.now();

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'GAS returned error');
      _books = (data.rows || []).reverse(); // most recent first
      document.getElementById('stat-count').textContent = _books.length;
      hideState();
      renderGrid();
    })
    .catch(err => {
      setState('<span>⚠ ' + err.message + '</span><span style="font-size:10px;margin-top:4px">Tap ⚙ to check URL or check internet</span>');
    });
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderGrid() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let books = _books.filter(b => {
    if (q) {
      const title = String(b['Title'] || '').toLowerCase();
      const isbn  = String(b['ISBN'] || '');
      if (!title.includes(q) && !isbn.includes(q)) return false;
    }
    if (_filter === 'TB')    return parseFloat(b['TB Price $']) > 0;
    if (_filter === 'BR')    return parseFloat(b['BooksRun $']) > 0;
    if (_filter === 'BS')    return parseFloat(b['BS #1 $']) > 0;
    if (_filter === 'EBAY')  return parseFloat(b['eBay Sold Net $']) >= 10;
    if (_filter === 'TRASH') return parseFloat(b['Best Price $']) < 0.50;
    return true;
  });

  // Sort
  books = books.slice().sort((a, b) => {
    const pa = parseFloat(a['Best Price $']) || 0;
    const pb = parseFloat(b['Best Price $']) || 0;
    return _sortDesc ? pb - pa : pa - pb;
  });

  const grid = document.getElementById('grid');
  if (books.length === 0) {
    grid.innerHTML = '';
    setState('<span>No books match</span>');
    return;
  }
  hideState();
  grid.innerHTML = books.map(bookCard).join('');
}

function bookCard(b) {
  const isbn       = String(b['ISBN'] || '');
  const title      = b['Title'] || 'Unknown Title';
  const bestVendor = b['Best Vendor'] || '';
  const bestPrice  = parseFloat(b['Best Price $']) || 0;
  const tbPrice    = parseFloat(b['TB Price $']) || 0;
  const brPrice    = parseFloat(b['BooksRun $']) || 0;
  const bs1v       = b['BS #1 Vendor'] || '';
  const bs1p       = parseFloat(b['BS #1 $']) || 0;
  const bs2v       = b['BS #2 Vendor'] || '';
  const bs2p       = parseFloat(b['BS #2 $']) || 0;
  const ebayAvg    = parseFloat(b['eBay Sold Avg $']) || 0;
  const ebayNet    = parseFloat(b['eBay Sold Net $']) || 0;
  const ebayCnt    = b['eBay Sold #'] || 0;
  const amzRank    = b['Amazon Rank'] || '';
  const scannedAt  = b['Scanned At'] || '';

  const coverUrl = isbn ? `https://images.abebooks.com/isbn/${isbn}-us-300.jpg` : '';

  const fp = v => v > 0 ? '$' + v.toFixed(2) : '—';

  const dateStr = scannedAt ? new Date(scannedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

  const ebayBadge = ebayNet >= 10
    ? `<div class="card-ebay-badge">eBay ${fp(ebayNet)} net (${ebayCnt} sold)</div>`
    : ebayAvg > 0
    ? `<div class="card-ebay-badge" style="color:var(--muted);border-color:var(--border)">eBay avg ${fp(ebayAvg)}</div>`
    : '';

  return `
  <div class="card">
    ${coverUrl
      ? `<img class="card-cover" src="${coverUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : ''}
    <div class="card-cover-placeholder" style="display:${coverUrl?'none':'flex'}">📚</div>
    <div class="card-body">
      <div class="card-title">${esc(title)}</div>
      <div class="card-isbn">${isbn}</div>
      <div class="card-best">
        <div class="card-best-price">${fp(bestPrice)}</div>
        <div class="card-best-vendor">${esc(bestVendor)}</div>
      </div>
      <div class="card-prices">
        <div class="price-row">
          <span class="price-label">ThriftBooks</span>
          <span class="price-val ${tbPrice>0?'purple':'zero'}">${fp(tbPrice)}</span>
        </div>
        <div class="price-row">
          <span class="price-label">BooksRun</span>
          <span class="price-val ${brPrice>0?'blue':'zero'}">${fp(brPrice)}</span>
        </div>
        ${bs1v ? `<div class="price-row">
          <span class="price-label">${esc(bs1v)}</span>
          <span class="price-val ${bs1p>0?'green':'zero'}">${fp(bs1p)}</span>
        </div>` : ''}
        ${bs2v && bs2p > 0 ? `<div class="price-row">
          <span class="price-label">${esc(bs2v)}</span>
          <span class="price-val green">${fp(bs2p)}</span>
        </div>` : ''}
        ${amzRank ? `<div class="price-row">
          <span class="price-label">AMZ rank</span>
          <span class="price-val">${Number(amzRank).toLocaleString()}</span>
        </div>` : ''}
      </div>
      ${ebayBadge}
      ${dateStr ? `<div class="card-date">${dateStr}</div>` : ''}
    </div>
  </div>`;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setState(html) {
  const s = document.getElementById('state');
  s.innerHTML = html;
  s.style.display = 'flex';
  document.getElementById('grid').innerHTML = '';
}
function hideState() {
  document.getElementById('state').style.display = 'none';
}

function toggleSort() {
  _sortDesc = !_sortDesc;
  document.getElementById('sort-toggle').textContent = (_sortDesc ? '↓' : '↑') + ' Best $';
  renderGrid();
}

function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  _filter = el.dataset.v;
  renderGrid();
}

function showUrlModal() {
  document.getElementById('url-input').value = _gasUrl;
  document.getElementById('url-modal').style.display = 'flex';
}
function hideUrlModal() {
  document.getElementById('url-modal').style.display = 'none';
}
function saveUrl() {
  const v = document.getElementById('url-input').value.trim();
  if (!v.includes('script.google.com')) { alert('Paste a valid script.google.com URL'); return; }
  _gasUrl = v;
  localStorage.setItem(STORE_KEY, v);
  hideUrlModal();
  loadBooks();
}
</script>
</body>
</html>
